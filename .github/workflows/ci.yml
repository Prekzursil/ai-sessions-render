name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: tests (${{ matrix.os }} py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # a Windows-only green run can hide a Linux/CI gap, so test both,
          # and pin the oldest + newest supported interpreter
          - { os: ubuntu-latest, python: "3.9" }
          - { os: ubuntu-latest, python: "3.13" }
          - { os: windows-latest, python: "3.13" }
          - { os: macos-latest, python: "3.13" }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      # pytest config enforces --cov-fail-under=100 (branch coverage) on aisr/
      - run: python -m pytest

  js:
    name: js tests (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run typecheck
      # enforces 100% statements/lines/functions + the branch floor
      - run: npm test
      - run: npm run build

  js-package:
    name: packaged npm artifact smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      # a green source tree does not prove the PACKED artifact works: pack, install
      # the tarball into a throwaway project, drive the installed binary
      - name: pack, install and drive the installed CLI
        run: |
          TGZ=$(npm pack --silent)
          mkdir -p /tmp/smoke && cd /tmp/smoke && npm init -y >/dev/null
          npm install "$OLDPWD/$TGZ"
          npx aisr demo /tmp/demo.html
      - name: postcondition - the demo page exists and is real HTML
        run: |
          test -s /tmp/demo.html
          head -c 15 /tmp/demo.html | grep -qi '<!doctype html'

  package:
    name: packaged-artifact smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build

      # A green source tree does not prove the BUILT artifact works. Install the
      # wheel into a clean venv, drive the installed console script, and assert a
      # real postcondition on what it produced.
      - name: install the wheel into a clean venv and run the CLI
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          /tmp/venv/bin/python -c "from aisr.adapters import chatgpt, claude, gemini; from aisr import cli, build, loaders; print('imports ok')"
          /tmp/venv/bin/aisr demo /tmp/demo.html
      - name: postcondition - the demo page exists and is real HTML
        run: |
          test -s /tmp/demo.html
          head -c 15 /tmp/demo.html | grep -qi '<!doctype html'
          echo "OK: $(wc -c < /tmp/demo.html) bytes"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
